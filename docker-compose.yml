version: '3.8'

x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:15-alpine
    container_name: vector-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vector_db
      POSTGRES_USER: vector_user
      POSTGRES_PASSWORD: ${VECTOR_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  vector-app:
    build: .
    container_name: vector-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - web
      - database

    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_BASE_URL=https://vector.jdok.dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vector_db
      - DB_USER=vector_user
      - DB_PASSWORD=${VECTOR_DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CONTENT_DIR=/app/content
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}

    volumes:
      - ./content:/app/content:rw

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.vector.rule=Host(`vector.jdok.dev`)"
      - "traefik.http.routers.vector.entrypoints=websecure"
      - "traefik.http.routers.vector.tls=true"
      - "traefik.http.routers.vector.tls.certresolver=cloudflare"
      - "traefik.http.services.vector.loadbalancer.server.port=3000"

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging: *default-logging

networks:
  web:
    external: true
  database:
    external: true

volumes:
  postgres_data:
