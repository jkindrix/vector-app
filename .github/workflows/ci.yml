name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx next lint --dir app --dir components --dir lib

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
